spring.application.name=MyFinance

# Configuração do DataSource para MySQL
spring.datasource.url=jdbc:postgresql://localhost:5432/DbMyFinance
spring.datasource.username=postgres
spring.datasource.password=Marioviado1@
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
# opções: none, validate, update, create, create-drop

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false


spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# logging.level.com.yourpackage=DEBUG
# logging.level.org.springframework.transaction=TRACE
# logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

